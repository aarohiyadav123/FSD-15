
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISKCON Temples Story</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        header{
            background:orange;
            color:white;
            text-align:center;
            padding:20px;
        }

        .audio-section{
            text-align:center;
            margin:20px;
            padding:20px;
            background:white;
            border-radius:10px;
        }

        audio{
            width:300px;
            margin-top:10px;
        }

        .container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .card{
            width:250px;
            background:white;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
            overflow:hidden;
            text-align:center;
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
        }

        .card h2{
            margin:10px 0;
        }

        .card p{
            color:gray;
            margin-bottom:15px;
        }

        footer{
            background:black;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>ISKCON Temples in India</h1>
        <p>Explore 11 beautiful ISKCON temples</p>
    </header>

    <div class="audio-section">
        <h2>Bhajan Audio</h2>
        <audio controls autoplay loop>
            <source src="audio/bhajan.mp3" type="audio/mp3">
        </audio>
    </div>

    <section class="container">

        <div class="card">
            <img src="images/vrindavan.jpg" alt="">
            <br>
            <P></P>
            <h2>ISKCON Vrindavan</h2>
            <p>Uttar Pradesh</p>
        </div>

        <div class="card">
            <img src="images/mayapur.jpg" alt="">
            <h2>ISKCON Mayapur</h2>
            <p>West Bengal</p>
        </div>

        <div class="card">
            <img src="images/delhi.jpg" alt="">
            <h2>ISKCON Delhi</h2>
            <p>New Delhi</p>
        </div>

        <div class="card">
            <img src="images/mumbai.jpg" alt="">
            <h2>ISKCON Mumbai</h2>
            <p>Maharashtra</p>
        </div>

        <div class="card">
            <img src="images/pune.jpg" alt="">
            <h2>ISKCON Pune</h2>
            <p>Maharashtra</p>
        </div>

        <div class="card">
            <img src="images/bangalore.jpg" alt="">
            <h2>ISKCON Bangalore</h2>
            <p>Karnataka</p>
        </div>

    </section>

    <footer>
        <p>Hare Krishna</p>
    </footer>

</body>
</html>
</body>
</html>
