<!DOCTYPE html>
<html>
<head>
    <title>Instagram Story</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#111;
        }
        .story-box{
            width:300px;
            height:500px;
            position:relative;
            border-radius:20px;
            overflow:hidden;
        }
        img{
            width:100%;
            height:100%;
            object-fit:cover;
        }
        .btn{
            position:absolute;
            top:50%;
            transform:translateY(-50%);
            background:rgba(255,255,255,0.5);
            padding:10px;
            cursor:pointer;
        }
        .left{
            left:10px;
        }
        .right{
            right:10px;
        }
    </style>
</head>
<body>

<div class="story-box">
    <div class="btn left" onclick="prevStory()">⬅</div>
    <img id="storyImage" src="" alt="story">
    <div class="btn right" onclick="nextStory()">➡</div>
</div>

<script>
    const stories = [
        "https://picsum.photos/id/101/300/500",
        "https://picsum.photos/id/102/300/500",
        "https://picsum.photos/id/103/300/500"
    ];

    let currentIndex = 0;

    function showStory(){
        document.getElementById("storyImage").src = stories[currentIndex];
    }

    function nextStory(){
        currentIndex++;
        if(currentIndex >= stories.length){
            currentIndex = 0;
        }
        showStory();
    }

    function prevStory(){
        currentIndex--;
        if(currentIndex < 0){
            currentIndex = stories.length - 1;
        }
        showStory();
    }

    showStory();
</script>

</body>
</html>
