<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Myntra Clone</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f5f5f5}
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 40px;
      background:#fff;
      position:sticky;
      top:0;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }
    .logo{font-size:28px;font-weight:bold;color:#ff3f6c}
    .nav{display:flex;gap:25px}
    .nav a{text-decoration:none;color:#222;font-weight:bold}
    .search input{
      width:250px;
      padding:10px;
      border:none;
      background:#f0f0f0;
      border-radius:5px;
    }
    .banner img{
      width:100%;
      height:400px;
      object-fit:cover;
    }
    .section-title{
      padding:30px;
      font-size:28px;
      font-weight:bold;
    }
    .products{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
      padding:20px;
    }
    .card{
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }
    .card img{
      width:100%;
      height:250px;
      object-fit:cover;
    }
    .card-content{padding:15px}
    .card-content h3{margin-bottom:10px}
    .price{color:#ff3f6c;font-weight:bold}
    .footer{
      background:#222;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:30px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">MYNTRA</div>
    <nav class="nav">
      <a href="#">Men</a>
      <a href="#">Women</a>
      <a href="#">Kids</a>
      <a href="#">Beauty</a>
      <a href="#">Home</a>
    </nav>
    <div class="search">
      <input type="text" placeholder="Search for products" />
    </div>
  </header>

  <section class="banner">
    <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8" alt="banner">
  </section>

  <div class="section-title">Trending Products</div>

  <section class="products">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518" alt="shirt">
      <div class="card-content">
        <h3>Casual Shirt</h3>
        <p class="price">₹999</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="shoes">
      <div class="card-content">
        <h3>Sports Shoes</h3>
        <p class="price">₹1499</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f" alt="dress">
      <div class="card-content">
        <h3>Women Dress</h3>
        <p class="price">₹1999</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" alt="jacket">
      <div class="card-content">
        <h3>Winter Jacket</h3>
        <p class="price">₹2499</p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>Made for Practice - Myntra Style Clone</p>
  </footer>
</body>
</html>
