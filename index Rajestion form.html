<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
        }
        body{
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-image: url(https://w0.peakpx.com/wallpaper/759/162/HD-wallpaper-lord-shrinathji-black-background.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }
        form{
            background-color: lightblue;
            height: 250px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 20px 0 rgb(220, 43, 226);
        }
        label,input{
            margin: 8px;
        }
        button{
            margin: 10px;
            padding: 5px;
            background-color: blueviolet;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <form>
        <label>Name:</label>
        <input type="text" placeholder="Write your name..">
        <br>
        <label>Age:</label>
        <input type="number">
        <br>
        <label>DOB:</label>
        <input type="date">
        <br>
        <label>Address:</label>
        <input type="text" placeholder="your address..">
        <br>
        <label>Email:</label>
        <input type="email" placeholder="your email id..">
        <br>
        <button type="submit">Register</button>
    </form>
</body>
</html>
