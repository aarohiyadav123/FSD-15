        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .item {
            background-color: lightcoral;
            height: 100px;
            width: 100px;
        }
        /* for tablets, ipads */
        @media(max-width:768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* for mobile */
        @media(max-width:576px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
